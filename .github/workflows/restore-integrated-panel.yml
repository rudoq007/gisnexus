name: Restore integrated panel markup

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/restore-integrated-panel.yml'

permissions:
  contents: write

jobs:
  restore-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Insert missing integrated panel
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          if '<section id="integrated" class="panel">' not in s:
              panel = '''
<section id="integrated" class="panel"><div class="grid"><section class="card full"><h2>Integrated priority assessment</h2><p class="note"><b>About this section:</b> This view combines live vegetation condition, rainfall deficit, frost screening, cropland relevance, and population exposure into a single integrated priority framework for Papua New Guinea.</p></section><section class="card kpi"><span class="muted">Population exposed</span><b id="integratedPopulationExposed">--</b><span class="muted">moderate to severe agricultural priority</span></section><section class="card kpi"><span class="muted">High-priority population</span><b id="integratedPopulationHigh">--</b><span class="muted">inside highest-priority zones</span></section><section class="card kpi"><span class="muted">High-priority cropland</span><b id="integratedCroplandHigh">--</b><span class="muted">hectares</span></section><section class="card kpi"><span class="muted">Stressed cropland</span><b id="integratedCroplandStressed">--</b><span class="muted">hectares</span></section><section class="card full"><h2>Integrated priority provincial table</h2><div class="table-controls"><div class="field"><label class="muted">Find province</label><input id="integratedSearch" type="text" placeholder="Type a province name"></div><div class="field"><label class="muted">Sort by</label><select id="integratedSort"><option value="priority_desc">Highest exposure priority first</option><option value="priority_asc">Lowest exposure priority first</option><option value="province_asc">Province A-Z</option><option value="province_desc">Province Z-A</option></select></div></div><div class="tablewrap"><table id="integratedTable"><thead><tr><th>Province</th><th>Composite stress</th><th>Agricultural priority</th><th>Exposure priority</th><th>Priority class</th><th>Population exposed</th><th>High-priority population</th><th>High-priority cropland (ha)</th><th>Stressed cropland (ha)</th></tr></thead><tbody></tbody></table></div></section></div></section>
'''
              s, _ = re.subn(
                  r'(<section id="asis" class="panel">.*?</section>)(\s*<section id="exposure" class="panel">)',
                  r'\1' + panel + r'\2',
                  s,
                  count=1,
                  flags=re.S,
              )

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Restore missing integrated panel"
          git push
