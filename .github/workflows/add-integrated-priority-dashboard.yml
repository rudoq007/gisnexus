name: Add integrated priority dashboard section

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/add-integrated-priority-dashboard.yml'

permissions:
  contents: write

jobs:
  patch-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch dashboard for integrated priority
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace(
              '<button class="tab" data-panel="asis">Live ASIS Drought Stress</button><button class="tab" data-panel="exposure">Population & Exposure</button>',
              '<button class="tab" data-panel="asis">Live ASIS Drought Stress</button><button class="tab" data-panel="integrated">Integrated Priority</button><button class="tab" data-panel="exposure">Population & Exposure</button>'
          )

          s = s.replace(
              '.pill,.map-badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.High{background:#fee2e2;color:#991b1b}.Moderate{background:#ffedd5;color:#9a3412}.Watch{background:#fef9c3;color:#854d0e}.Lower{background:#dcfce7;color:#166534}.NoData{background:#e2e8f0;color:#334155}.map-badge{background:#E7F1F8;color:#102A43;border:1px solid #C7D9EA;white-space:nowrap}',
              '.pill,.map-badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.Severe{background:#7f0000;color:#fff}.High{background:#d73027;color:#fff}.Moderate{background:#fc8d59;color:#fff}.Watch{background:#fee08b;color:#854d0e}.Low{background:#91cf60;color:#166534}.Lower{background:#dcfce7;color:#166534}.NoData{background:#e2e8f0;color:#334155}.map-badge{background:#E7F1F8;color:#102A43;border:1px solid #C7D9EA;white-space:nowrap}'
          )

          integrated_section = '''<section id="integrated" class="panel"><div class="grid"><section class="card full"><h2>Integrated priority assessment</h2><p class="note"><b>About this section:</b> This view combines live vegetation condition, rainfall deficit, frost screening, cropland relevance, and population exposure into a single integrated priority framework for Papua New Guinea.</p></section><section class="card kpi"><span class="muted">Population exposed</span><b id="integratedPopulationExposed">--</b><span class="muted">moderate to severe agricultural priority</span></section><section class="card kpi"><span class="muted">High-priority population</span><b id="integratedPopulationHigh">--</b><span class="muted">inside highest-priority zones</span></section><section class="card kpi"><span class="muted">High-priority cropland</span><b id="integratedCroplandHigh">--</b><span class="muted">hectares</span></section><section class="card kpi"><span class="muted">Stressed cropland</span><b id="integratedCroplandStressed">--</b><span class="muted">hectares</span></section><section class="card full"><h2>Integrated priority provincial table</h2><div class="table-controls"><div class="field"><label class="muted">Find province</label><input id="integratedSearch" type="text" placeholder="Type a province name"></div><div class="field"><label class="muted">Sort by</label><select id="integratedSort"><option value="priority_desc">Highest exposure priority first</option><option value="priority_asc">Lowest exposure priority first</option><option value="province_asc">Province A-Z</option><option value="province_desc">Province Z-A</option></select></div></div><div class="tablewrap"><table id="integratedTable"><thead><tr><th>Province</th><th>Composite stress</th><th>Agricultural priority</th><th>Exposure priority</th><th>Priority class</th><th>Population exposed</th><th>High-priority population</th><th>High-priority cropland (ha)</th><th>Stressed cropland (ha)</th></tr></thead><tbody></tbody></table></div></section></div></section>'''
          s = s.replace('</section><section id="exposure" class="panel">', f'</section>{integrated_section}<section id="exposure" class="panel">', 1)

          s = s.replace(
              "const LIVE_ASIS_URL='data/asis_vhi_latest.json?v='+Date.now();\nconst LIVE_PROCESSING_URL='data/live_processing_status.json?v='+Date.now();",
              "const LIVE_ASIS_URL='data/asis_vhi_latest.json?v='+Date.now();\nconst LIVE_PROCESSING_URL='data/live_processing_status.json?v='+Date.now();\nconst INTEGRATED_PRIORITY_URL='data/integrated_priority_latest.json?v='+Date.now();"
          )

          s = s.replace(
              "const fmt=x=>x==null?'No data':Number(x).toLocaleString(undefined,{maximumFractionDigits:0});\nconst fmt3=x=>x==null?'No data':Number(x).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3});",
              "const fmt=x=>x==null?'No data':Number(x).toLocaleString(undefined,{maximumFractionDigits:0});\nconst fmt3=x=>x==null?'No data':Number(x).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3});\nconst fmtInt=x=>x==null?'No data':Number(x).toLocaleString(undefined,{maximumFractionDigits:0});"
          )

          s = s.replace(
              "let liveData=null,liveRows=[],rowIndex={},liveProcessingData=null,liveProcessingRows=[],map,mapStarted=false,geo,asisTile,markerLayer,provinceLayer,baseLayerRefs={},overlayLayersRef={},charts={};",
              "let liveData=null,liveRows=[],rowIndex={},liveProcessingData=null,liveProcessingRows=[],integratedData=null,integratedRows=[],map,mapStarted=false,geo,asisTile,integratedCompositeTile,integratedAgricultureTile,integratedExposureTile,markerLayer,provinceLayer,baseLayerRefs={},overlayLayersRef={},charts={};"
          )

          helper_block = """function filterIntegratedRows(rows,query){const q=(query||'').trim().toLowerCase();if(!q)return rows.slice();return rows.filter(r=>(r.province||'').toLowerCase().includes(q))}\nfunction sortIntegratedRows(rows,choice){const out=rows.slice();if(choice==='province_asc')return out.sort((a,b)=>(a.province||'').localeCompare(b.province||''));if(choice==='province_desc')return out.sort((a,b)=>(b.province||'').localeCompare(a.province||''));if(choice==='priority_asc')return out.sort((a,b)=>(a.exposure_priority_mean??999)-(b.exposure_priority_mean??999));return out.sort((a,b)=>(b.exposure_priority_mean??-999)-(a.exposure_priority_mean??-999))}\nfunction renderIntegratedTable(){const tbody=document.querySelector('#integratedTable tbody');if(!tbody)return;const query=document.getElementById('integratedSearch')?.value||'';const sort=document.getElementById('integratedSort')?.value||'priority_desc';const rows=sortIntegratedRows(filterIntegratedRows(integratedRows,query),sort);if(!rows.length){tbody.innerHTML='<tr><td colspan=\"9\">No matching provinces found.</td></tr>';return}tbody.innerHTML=rows.map(r=>`<tr><td><b>${r.province||'Unknown'}</b></td><td>${r.composite_biophysical_stress_mean==null?'No data':Number(r.composite_biophysical_stress_mean).toFixed(1)}</td><td>${r.agricultural_priority_mean==null?'No data':Number(r.agricultural_priority_mean).toFixed(1)}</td><td>${r.exposure_priority_mean==null?'No data':Number(r.exposure_priority_mean).toFixed(1)}</td><td><span class=\"pill ${r.priority_class||'NoData'}\">${r.priority_class||'No data'}</span></td><td>${fmtInt(r.population_exposed_total)}</td><td>${fmtInt(r.population_high_priority)}</td><td>${fmtInt(r.cropland_high_ha)}</td><td>${fmtInt(r.cropland_stressed_ha)}</td></tr>`).join('')}\nfunction updateIntegratedSection(data){integratedData=data||null;integratedRows=Array.isArray(data?.provinces)?data.provinces.slice():[];const summary=data?.national_summary||{};if(document.getElementById('integratedPopulationExposed'))integratedPopulationExposed.textContent=fmtInt(summary.total_population_exposed);if(document.getElementById('integratedPopulationHigh'))integratedPopulationHigh.textContent=fmtInt(summary.total_population_high_priority);if(document.getElementById('integratedCroplandHigh'))integratedCroplandHigh.textContent=fmtInt(summary.total_cropland_high_ha);if(document.getElementById('integratedCroplandStressed'))integratedCroplandStressed.textContent=fmtInt(summary.total_cropland_stressed_ha);renderIntegratedTable()}\n"""
          s = s.replace(
              "function matchProvince(name){const k=norm(name);if(!k)return null;const aliasName=alias[k];const aliasKey=aliasName?norm(aliasName):'';return rowIndex[k]||(aliasKey?rowIndex[aliasKey]:null)||null}",
              helper_block + "function matchProvince(name){const k=norm(name);if(!k)return null;const aliasName=alias[k];const aliasKey=aliasName?norm(aliasName):'';return rowIndex[k]||(aliasKey?rowIndex[aliasKey]:null)||null}"
          )

          old_initmap = "function initMap(){if(mapStarted)return;mapStarted=true;map=L.map('map',{scrollWheelZoom:false}).setView([-6.2,145.2],6);map.createPane('rasterPane');map.getPane('rasterPane').style.zIndex=220;map.createPane('provincePane');map.getPane('provincePane').style.zIndex=360;map.createPane('pointPane');map.getPane('pointPane').style.zIndex=420;baseLayerRefs={'OpenStreetMap':L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap contributors'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'&copy; OpenStreetMap contributors &copy; CARTO'}),'World Imagery':L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18,attribution:'Tiles &copy; Esri'}),'Topographic':L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'})};baseLayerRefs['Carto Light'].addTo(map);if(liveData?.tile_url){asisTile=L.tileLayer(liveData.tile_url,{pane:'rasterPane',attribution:'FAO ASIS/GIEWS',opacity:.82}).addTo(map);overlayLayersRef.raster=asisTile}drawMarkers();fetch('adm1_nso_province.geojson').then(r=>{if(!r.ok)throw new Error('Boundary service returned '+r.status);return r.json()}).then(g=>{provinceLayer=L.geoJSON(g,{pane:'provincePane',style:styleFeature,onEachFeature:(f,l)=>{const n=getFeatureName(f);l.on({mouseover:e=>e.target.setStyle({weight:3,color:'#111827'}),mouseout:e=>provinceLayer.resetStyle(e.target),click:()=>l.bindPopup(popup(matchProvince(n),n)).openPopup()})}}).addTo(map);overlayLayersRef.provinces=provinceLayer;if(markerLayer && !map.hasLayer(markerLayer))markerLayer.addTo(map);if(map._layerControl)map.removeControl(map._layerControl);map._layerControl=L.control.layers(baseLayerRefs,{'Vegetation screening raster':asisTile,'Provincial polygons':provinceLayer,'Province point summaries':markerLayer},{collapsed:false,position:'topright'}).addTo(map);map.fitBounds(provinceLayer.getBounds(),{padding:[12,12]})}).catch(e=>{console.warn('Boundary failed, using centroid fallback:',e);if(map._layerControl)map.removeControl(map._layerControl);map._layerControl=L.control.layers(baseLayerRefs,{'Vegetation screening raster':asisTile,'Province point summaries':markerLayer},{collapsed:false,position:'topright'}).addTo(map)});addLegend();setTimeout(()=>map.invalidateSize(),150)}"
          new_initmap = "function initMap(){if(mapStarted)return;mapStarted=true;map=L.map('map',{scrollWheelZoom:false}).setView([-6.2,145.2],6);map.createPane('rasterPane');map.getPane('rasterPane').style.zIndex=220;map.createPane('provincePane');map.getPane('provincePane').style.zIndex=360;map.createPane('pointPane');map.getPane('pointPane').style.zIndex=420;baseLayerRefs={'OpenStreetMap':L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap contributors'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'&copy; OpenStreetMap contributors &copy; CARTO'}),'World Imagery':L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18,attribution:'Tiles &copy; Esri'}),'Topographic':L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'})};baseLayerRefs['Carto Light'].addTo(map);if(liveData?.tile_url){asisTile=L.tileLayer(liveData.tile_url,{pane:'rasterPane',attribution:'FAO ASIS/GIEWS',opacity:.82}).addTo(map);overlayLayersRef.raster=asisTile}if(integratedData?.layers?.composite_biophysical_stress_tile_url){integratedCompositeTile=L.tileLayer(integratedData.layers.composite_biophysical_stress_tile_url,{pane:'rasterPane',attribution:'Integrated composite priority',opacity:.82})}if(integratedData?.layers?.agricultural_priority_tile_url){integratedAgricultureTile=L.tileLayer(integratedData.layers.agricultural_priority_tile_url,{pane:'rasterPane',attribution:'Agricultural priority',opacity:.82})}if(integratedData?.layers?.exposure_priority_tile_url){integratedExposureTile=L.tileLayer(integratedData.layers.exposure_priority_tile_url,{pane:'rasterPane',attribution:'Exposure priority',opacity:.82})}drawMarkers();fetch('adm1_nso_province.geojson').then(r=>{if(!r.ok)throw new Error('Boundary service returned '+r.status);return r.json()}).then(g=>{provinceLayer=L.geoJSON(g,{pane:'provincePane',style:styleFeature,onEachFeature:(f,l)=>{const n=getFeatureName(f);l.on({mouseover:e=>e.target.setStyle({weight:3,color:'#111827'}),mouseout:e=>provinceLayer.resetStyle(e.target),click:()=>l.bindPopup(popup(matchProvince(n),n)).openPopup()})}}).addTo(map);overlayLayersRef.provinces=provinceLayer;if(markerLayer && !map.hasLayer(markerLayer))markerLayer.addTo(map);if(map._layerControl)map.removeControl(map._layerControl);const overlayMaps={'Vegetation screening raster':asisTile,'Provincial polygons':provinceLayer,'Province point summaries':markerLayer};if(integratedCompositeTile)overlayMaps['Composite biophysical stress']=integratedCompositeTile;if(integratedAgricultureTile)overlayMaps['Agricultural priority']=integratedAgricultureTile;if(integratedExposureTile)overlayMaps['Exposure priority']=integratedExposureTile;map._layerControl=L.control.layers(baseLayerRefs,overlayMaps,{collapsed:false,position:'topright'}).addTo(map);map.fitBounds(provinceLayer.getBounds(),{padding:[12,12]})}).catch(e=>{console.warn('Boundary failed, using centroid fallback:',e);if(map._layerControl)map.removeControl(map._layerControl);const overlayMaps={'Vegetation screening raster':asisTile,'Province point summaries':markerLayer};if(integratedCompositeTile)overlayMaps['Composite biophysical stress']=integratedCompositeTile;if(integratedAgricultureTile)overlayMaps['Agricultural priority']=integratedAgricultureTile;if(integratedExposureTile)overlayMaps['Exposure priority']=integratedExposureTile;map._layerControl=L.control.layers(baseLayerRefs,overlayMaps,{collapsed:false,position:'topright'}).addTo(map)});addLegend();setTimeout(()=>map.invalidateSize(),150)}"
          s = s.replace(old_initmap, new_initmap)

          old_init = "function init(){initTabs();printBtn.addEventListener('click',()=>window.print());csvBtn.addEventListener('click',downloadCSV);provinceSelect.addEventListener('change',e=>showProvince(e.target.value));document.getElementById('asisSearch').addEventListener('input',renderAsisTable);document.getElementById('asisSort').addEventListener('change',renderAsisTable);document.getElementById('exposureSearch').addEventListener('input',renderExposureTable);document.getElementById('exposureSort').addEventListener('change',renderExposureTable);fetch(LIVE_ASIS_URL).then(r=>{if(!r.ok)throw new Error('Live ASIS JSON not found: '+r.status);return r.json()}).then(applyLiveData).catch(e=>{console.warn(e);applyPending()});fetch(LIVE_PROCESSING_URL).then(r=>{if(!r.ok)throw new Error('Live processing status JSON not found: '+r.status);return r.json()}).then(updateLiveProcessingCard).catch(e=>{console.warn(e);applyLiveProcessingPending()})}"
          new_init = "function init(){initTabs();printBtn.addEventListener('click',()=>window.print());csvBtn.addEventListener('click',downloadCSV);provinceSelect.addEventListener('change',e=>showProvince(e.target.value));document.getElementById('asisSearch').addEventListener('input',renderAsisTable);document.getElementById('asisSort').addEventListener('change',renderAsisTable);document.getElementById('exposureSearch').addEventListener('input',renderExposureTable);document.getElementById('exposureSort').addEventListener('change',renderExposureTable);document.getElementById('integratedSearch')?.addEventListener('input',renderIntegratedTable);document.getElementById('integratedSort')?.addEventListener('change',renderIntegratedTable);fetch(LIVE_ASIS_URL).then(r=>{if(!r.ok)throw new Error('Live ASIS JSON not found: '+r.status);return r.json()}).then(applyLiveData).catch(e=>{console.warn(e);applyPending()});fetch(LIVE_PROCESSING_URL).then(r=>{if(!r.ok)throw new Error('Live processing status JSON not found: '+r.status);return r.json()}).then(updateLiveProcessingCard).catch(e=>{console.warn(e);applyLiveProcessingPending()});fetch(INTEGRATED_PRIORITY_URL).then(r=>{if(!r.ok)throw new Error('Integrated priority JSON not found: '+r.status);return r.json()}).then(updateIntegratedSection).catch(e=>{console.warn(e);integratedRows=[];if(document.getElementById('integratedPopulationExposed'))integratedPopulationExposed.textContent='Pending';if(document.getElementById('integratedPopulationHigh'))integratedPopulationHigh.textContent='Pending';if(document.getElementById('integratedCroplandHigh'))integratedCroplandHigh.textContent='Pending';if(document.getElementById('integratedCroplandStressed'))integratedCroplandStressed.textContent='Pending';renderIntegratedTable()})}"
          s = s.replace(old_init, new_init)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit dashboard patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Add integrated priority dashboard section"
          git push
