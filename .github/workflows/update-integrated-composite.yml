name: Update integrated composite priority

on:
  workflow_dispatch:
  schedule:
    - cron: "45 2 * * *"

permissions:
  contents: write

jobs:
  build-integrated-composite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install earthengine-api

      - name: Prepare Earth Engine credentials
        env:
          EARTHENGINE_SERVICE_ACCOUNT_JSON: ${{ secrets.EARTHENGINE_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$EARTHENGINE_SERVICE_ACCOUNT_JSON" || (echo "Missing secret EARTHENGINE_SERVICE_ACCOUNT_JSON" && exit 1)
          printf '%s' "$EARTHENGINE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/ee-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/ee-service-account.json" >> "$GITHUB_ENV"
          python - <<'PY' >> "$GITHUB_ENV"
          import json, os
          with open(os.environ["RUNNER_TEMP"] + "/ee-service-account.json", encoding="utf-8") as f:
              info = json.load(f)
          print("EARTHENGINE_PROJECT=" + info.get("project_id", "trekky675"))
          PY

      - name: Build integrated composite outputs
        run: |
          python scripts/build_integrated_composite.py \
            --json-output data/integrated_priority_latest.json \
            --csv-output data/integrated_priority_latest.csv

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/integrated_priority_latest.json data/integrated_priority_latest.csv scripts/build_integrated_composite.py .github/workflows/update-integrated-composite.yml
          git diff --cached --quiet || git commit -m "Update integrated composite priority outputs"
          git push
