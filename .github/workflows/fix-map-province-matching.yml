name: Fix interactive map province matching

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/fix-map-province-matching.yml'

permissions:
  contents: write

jobs:
  patch-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch province name matching logic
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          old_build = "function buildIndex(){rowIndex={};liveRows.forEach(r=>{rowIndex[norm(r.province)]=r})}"
          new_build = "function buildIndex(){rowIndex={};liveRows.forEach(r=>{const key=norm(r.province);if(key)rowIndex[key]=r})}"
          s = s.replace(old_build, new_build)

          old_match = "function matchProvince(name){const k=norm(name);return rowIndex[k]||rowIndex[norm(alias[k])]||null}"
          new_match = "function matchProvince(name){const k=norm(name);if(!k)return null;const aliasName=alias[k];const aliasKey=aliasName?norm(aliasName):'';return rowIndex[k]||(aliasKey?rowIndex[aliasKey]:null)||null}"
          s = s.replace(old_match, new_match)

          old_feature = "function getFeatureName(f){return f.properties.shapeName||f.properties.name||f.properties.NAME_1||f.properties.ADM1_EN||f.properties.province||f.properties.ADM1_NAME||'Province'}"
          new_feature = "function getFeatureName(f){const p=(f&&f.properties)||{};return p.shapeName||p.shape_name||p.name||p.NAME_1||p.ADM1_EN||p.province||p.PROVINCE||p.Province||p.ADM1_NAME||p.admin1Name||''}"
          s = s.replace(old_feature, new_feature)

          old_popup = "function popup(row,name){if(!row)return`<b>${name}</b><br>No live ASIS/GIEWS record matched.`;return`<b>${row.province}</b><br><span class=\"pill ${stressShort(row.mean)}\">${stressClass(row.mean)}</span><br>Vegetation index: <b>${fmt3(row.mean)}</b><br><small>${meaning(row)}</small>`}"
          new_popup = "function popup(row,name){if(!row)return`<b>${name||'Province'}</b><br>Province summary is not available for this map feature yet.`;return`<b>${row.province}</b><br><span class=\"pill ${stressShort(row.mean)}\">${stressClass(row.mean)}</span><br>Vegetation index: <b>${fmt3(row.mean)}</b><br><small>${meaning(row)}</small>`}"
          s = s.replace(old_popup, new_popup)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit province matching fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Fix interactive map province matching"
          git push
